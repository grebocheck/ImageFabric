name: CI

# The whole pipeline runs in STUB mode (no GPU/ML stack), so the queue ->
# arbiter swap -> gallery flow and the memory-budget logic are all CI-testable
# on a plain Linux runner. See backend/tests and frontend/src/**/*.test.*.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install light deps + test tools
        run: pip install -r requirements.txt pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check app tests
      - name: Test (stub mode)
        run: pytest

  frontend:
    name: frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Test
        run: npm test
